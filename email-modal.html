<!-- ==========================================
     EMAIL MODAL — Shared Component
     Include once in index.html body
     ========================================== -->
<div class="email-modal-overlay" id="emailModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="email-modal">
    <button class="email-modal__close" onclick="closeEmailModal()" aria-label="Fechar">&#215;</button>
    <p class="email-modal__eyebrow" id="modalContext">Consulta Particular</p>
    <h2 class="email-modal__title" id="modalTitle">Fale com um sócio</h2>
    <p class="email-modal__sub" id="modalSub">
      Toda consulta é tratada com absoluta discrição. Responderemos em até 24 horas.
    </p>
    <form onsubmit="submitEmail(event)">
      <input type="text" name="name" placeholder="Seu nome completo" required autocomplete="name" />
      <input type="email" name="email" placeholder="E-mail corporativo" required autocomplete="email" />
      <input type="tel" name="phone" placeholder="Telefone (opcional)" autocomplete="tel" />
      <select name="area" required>
        <option value="" disabled selected>Área de interesse</option>
        <option value="private-wealth">Private Wealth</option>
        <option value="corporate-ma">Corporate M&amp;A</option>
        <option value="cyber-law">Cyber Law</option>
        <option value="other">Outra área</option>
      </select>
      <textarea name="message" placeholder="Descreva brevemente sua necessidade jurídica…"></textarea>
      <button type="submit" class="email-modal__submit">Enviar mensagem confidencial</button>
    </form>
    <p class="email-modal__privacy">🔒 Seus dados são protegidos e nunca compartilhados.</p>
  </div>
</div>

<script>
  function openEmailModal(context, title, sub) {
    if (context) document.getElementById('modalContext').textContent = context;
    if (title)   document.getElementById('modalTitle').textContent   = title;
    if (sub)     document.getElementById('modalSub').textContent     = sub;
    document.getElementById('emailModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeEmailModal() {
    document.getElementById('emailModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('emailModal').addEventListener('click', function(e) {
    if (e.target === this) closeEmailModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeEmailModal();
  });

  function submitEmail(e) {
    e.preventDefault();
    const form = e.target;
    const data = Object.fromEntries(new FormData(form));
    const mailto = `mailto:contato@sovereignlaw.com?subject=Consulta: ${encodeURIComponent(data.area || 'Geral')}&body=${encodeURIComponent(
      `Nome: ${data.name}\nE-mail: ${data.email}\nTelefone: ${data.phone || '—'}\nÁrea: ${data.area}\n\n${data.message}`
    )}`;
    window.location.href = mailto;
    setTimeout(() => {
      form.reset();
      closeEmailModal();
    }, 400);
  }
</script>
